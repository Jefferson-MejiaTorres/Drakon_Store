spring:
  application:
    name: drakon-store

  datasource:
    url: jdbc:postgresql://localhost:5432/drakon_store
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true


  jackson:
    time-zone: America/Bogota

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
